# A Compose file with minimal dependencies to be able to run Flagsmith, including its test suite, locally (not in Docker).

name: flagsmith

volumes:
  pg_11_data:
  pg_11_data_analytics:
  clickhouse_data:

services:
  db:
    image: postgres:15.5-alpine
    pull_policy: always
    restart: unless-stopped
    command: ["-c", "max_locks_per_transaction=256"]
    volumes:
      - pg_11_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: flagsmith
      POSTGRES_PASSWORD: password

  analytics-db:
    image: postgres:15.5-alpine
    pull_policy: always
    restart: unless-stopped
    command: ["-c", "max_locks_per_transaction=256"]
    volumes:
      - pg_11_data_analytics:/var/lib/postgresql/data
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: analytics
      POSTGRES_PASSWORD: password

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    pull_policy: always
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - 8123:8123   # HTTP interface
      - 9000:9000   # Native protocol
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

  otel-collector:
    image: otelcol-flagsmith
    pull_policy: never
    restart: unless-stopped
    depends_on:
      - clickhouse
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - 4318:4318
