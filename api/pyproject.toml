    "django-admin-sso>=5.2.0,<5.3.0",
    "drf-spectacular>=0.28.0,<0.29.0",
    "sentry-sdk>=2.24.1,<3",
    "environs>=14.1.1,<15.0.0",
    "django-lifecycle>=1.2.4,<1.3.0",
    "drf-writable-nested>=0.6.2,<0.7.0",
