[project.optional-dependencies]
# Optional groups historically pulled in as git deps from the original
# poetry config. The dist names below match what each upstream project
# actually publishes via its current build backend (setuptools fallback
# for repos without [build-system], poetry-core where present).
#
# Several upstream repos declare deps via `[tool.poetry.dependencies]`
# without a PEP 517 `[build-system]` table, so setuptools fallback drops
# them from the built wheel. We re-declare those transitive deps here so
# the resolution matches what poetry produced on main.
auth-controller = [
    "auth-controller",
    "django-multiselectfield>=1.0.1,<2",
]
saml = [
    "pysaml2>=7.4.2,<8.0.0",
]
ldap = [
    "flagsmith-ldap",
    "django-python3-ldap>=0.15.6,<1",
]
workflows = [
    "workflows-logic",
]
licensing = [
    "licensing",
    "cryptography>=44.0.1",
]
release-pipelines = [
    "flagsmith-private",
]
dev = [
    "django-test-migrations>=1.2.0,<2.0.0",
    "responses>=0.22.0,<0.23.0",
    "pre-commit>=4.0.1,<5.0.0",
    "pytest-mock>=3.10.0,<3.11.0",
    "pytest-lazy-fixture>=0.6.3,<0.7.0",
    "moto>=4.1.3,<4.2.0",
    # TODO: move to https://github.com/adamchainz/time-machine
    "pytest-freezegun>=0.4.2,<0.5.0",
    # setuptools only exists because pytest-freezegun fails without it
    "setuptools",
    "pytest-xdist>=3.6.1,<3.7.0",
    "pylint>=2.16.2,<2.17.0",
    "pep8>=1.7.1,<1.8.0",
