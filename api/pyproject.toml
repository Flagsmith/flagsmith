    "flagsmith-common[test-tools]",
    "pytest-responses>=0.5.1,<0.6.0",
    "diff-cover>=10.1.0,<11.0.0",
    "django-debug-toolbar",
    "ipython>=9.10.0,<10.0.0",
    # datamodel-code-generator requires `pydantic[email]`, but our
    # override-dependencies on pydantic strips the email extra. Re-add
    # the transitive deps so poetry.lock parity is preserved.
    "email-validator>=2.0.0",
    "pyjwt>=2.13.0"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
# Exclude things that aren't Python packages and avoid sweeping in build dirs
exclude = ["build*", "dist*", "static*", "staticfiles*", "venv*", ".venv*", "scripts*"]

[tool.setuptools.package-data]
"*" = ["*.*"]

[[tool.uv.index]]
name = "flagsmith-pypi-production"
url = "https://flagsmith-production-084060095745.d.codeartifact.eu-west-2.amazonaws.com/pypi/flagsmith-pypi-production/simple/"
explicit = true

[tool.uv.sources]
flagsmith-private = { index = "flagsmith-pypi-production" }
clickhouse-driver = { git = "https://github.com/Flagsmith/clickhouse-driver", branch = "newjson" }

[tool.uv]
required-version = ">=0.11.18"  # Ensure this matches the version in .pre-commit-config.yaml

[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py313"
extend-exclude = ["migrations"]

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
docstring-code-line-length = "dynamic"

[tool.ruff.lint]
# Establish parity with flake8 + isort
select = ["C901", "E4", "E7", "E9", "F", "I", "W"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# Need the * prefix to work with pre-commit which runs from the root of the repo
"*app/settings/local.py" = ["F403", "F405"]
"*app/settings/production.py" = ["F403", "F405"]
"*app/settings/saas.py" = ["F403", "F405"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

[tool.coverage.report]
# Regexes for lines to exclude from consideration
exclude_also = ['@(abc\\.)?abstractmethod']

[tool.coverage.run]
omit = [
  "app/settings/common.py",
  "app/settings/local.py",
  "manage.py",
  "e2etests/*",
  "scripts/*",
]

[tool.pytest.ini_options]
pythonpath = ['.']
addopts = [
  '--ds=app.settings.test',
  '-vvvv',
  '-p',
  'no:warnings',
  '--dist=worksteal',
  '--import-mode=importlib',
]
console_output_style = 'count'
log_level = 'INFO'

[tool.mypy]
plugins = ["mypy_django_plugin.main"]
strict = true
show_absolute_path = true

[[tool.mypy.overrides]]
module = ["admin_sso.models"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["rbac.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["saml.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["licensing.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["oauth2_provider.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["openfeature_flagsmith.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["clickhouse_backend.*", "clickhouse_driver.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["scim.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Suppresses `no-any-return` when the `scim` package isn't installed (which
# happens on the public PR workflow that runs mypy without the `--extra private`
# extra). With the extra installed, the bearer fixtures return the real `str`.
module = ["tests.integration.scim.conftest"]
warn_return_any = false

[tool.django-stubs]
django_settings_module = "app.settings.local"

[tool.drf-stubs]
enabled = true
