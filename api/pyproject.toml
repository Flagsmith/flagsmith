    "pytest-responses>=0.5.1,<0.6.0",
    "diff-cover>=10.1.0,<11.0.0",
    "django-debug-toolbar",
    "ipython>=9.10.0,<10.0.0",
    # datamodel-code-generator requires `pydantic[email]`, but our
    # override-dependencies on pydantic strips the email extra. Re-add
    # the transitive deps so poetry.lock parity is preserved.
    "email-validator>=2.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
# Exclude things that aren't Python packages and avoid sweeping in build dirs
exclude = ["build*", "dist*", "static*", "staticfiles*", "venv*", ".venv*", "scripts*"]

[tool.setuptools.package-data]
"*" = ["*.*"]

[tool.uv.sources]
auth-controller = { git = "https://github.com/flagsmith/flagsmith-auth-controller", tag = "v0.2.0" }
flagsmith-ldap = { git = "https://github.com/flagsmith/flagsmith-ldap", tag = "v0.1.2" }
workflows-logic = { git = "https://github.com/flagsmith/flagsmith-workflows", tag = "v3.4.0" }
