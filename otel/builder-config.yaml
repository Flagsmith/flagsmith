dist:
  name: otelcol-flagsmith
  description: "Flagsmith OTel Collector with Amplitude exporter"
  output_path: ./build
  module: github.com/Flagsmith/flagsmith/otel

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.147.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.147.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.147.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.147.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/clickhouseexporter v0.147.0
  - gomod: github.com/Flagsmith/flagsmith/otel/exporter/amplitudeexporter v0.0.1
    path: ./exporter/amplitudeexporter

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.53.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.53.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.53.0
