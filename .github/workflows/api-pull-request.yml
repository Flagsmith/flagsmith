name: API Pull Request

permissions:
  contents: read # For actions/checkout
  id-token: write # For Codecov OIDC

on:
  pull_request:
    paths:
      - api/**
      - docker/api/**
      - .github/**
      - .release-please-manifest.json
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    paths:
      - api/**
      - docker/api/**
      - .github/**
      - .release-please-manifest.json
    branches:
      - main

defaults:
  run:
    working-directory: api

env:
  DOTENV_OVERRIDE_FILE: .env-ci

jobs:
  test:
    runs-on: depot-ubuntu-latest-16
    name: API Unit Tests

    strategy:
      max-parallel: 3
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Cloning repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: ./.github/actions/install-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: make install-packages opts='--extra dev'

      - name: Check for missing migrations
        env:
          opts: --no-input --dry-run --check
        run: make django-make-migrations

      - uses: liskin/gh-problem-matcher-wrap@4abcf297257f3006bf8834221ec75181d6aff5e9 # v2
        with:
          action: add
          linters: mypy

      - name: Check for new typing errors
        run: make typecheck

      - uses: liskin/gh-problem-matcher-wrap@4abcf297257f3006bf8834221ec75181d6aff5e9 # v2
        with:
          action: remove
          linters: mypy

      - name: Check autogenerated documentation
        uses: nickcharlton/diff-check@9fa7ac2bd275b9ec60f13dbcef1b90cfaadc1872 # v1.0.0
        with:
          command: make -C api generate-docs

      - name: Run Tests
        run: make test

      - name: Upload Coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        env:
          PYTHON: ${{ matrix.python-version }}
        with:
          env_vars: PYTHON
          use_oidc: true
