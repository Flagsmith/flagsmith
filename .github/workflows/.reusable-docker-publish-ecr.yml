# reusable workflow
name: Publish Docker Image to ECR

on:
  workflow_call:
    inputs:
      source-images:
        type: string
        description: Source image to publish
        required: true
      target-images:
        type: string
        description: Target image names (ECR repository URI)
        required: true
      aws-region:
        type: string
        description: AWS region for ECR authentication
        required: true

jobs:
  publish:
    name: Publish ${{ inputs.source-images }} to ${{ inputs.target-images }}
    runs-on: depot-ubuntu-latest

    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Cloning repo
        uses: actions/checkout@v5
        with:
          sparse-checkout: depot.json
          sparse-checkout-cone-mode: false

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PUBLISH_ECR_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.target-images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Setup Docker buildx with Depot builder so imagetools have access to Depot cache
      - uses: depot/use-action@v1

      - name: Publish Image
        uses: kphrx/docker-buildx-imagetools-action@v0.1.2
        with:
          sources: ${{ inputs.source-images }}
          tags: ${{ steps.meta.outputs.tags }}
