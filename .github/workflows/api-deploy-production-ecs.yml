name: API Deploy to Production ECS

on:
  push:
    tags:
      - '*'
    paths:
      - api/**
      - .github/**
      - infrastructure/aws/production/**

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy-ecs:
    uses: ./.github/workflows/.reusable-deploy-ecs.yml
    with:
      environment: production
    secrets: inherit

  mcp-schema-push:
    needs: deploy-ecs
    name: Push MCP Schema to Gram
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      id-token: write # For CodeArtifact OIDC
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.12"

      - name: Authenticate with CodeArtifact (production)
        uses: ./.github/actions/codeartifact-login

      - name: Authenticate with CodeArtifact (staging)
        uses: ./.github/actions/codeartifact-login
        with:
          account-id: "302456015006"
          role-name: codeartifact-github-actions-staging
          domain: flagsmith-staging
          index-name: flagsmith-pypi-staging

      - name: Install dependencies
        run: |
          echo "https://${{ secrets.GH_PRIVATE_ACCESS_TOKEN }}:@github.com" > ${HOME}/.git-credentials
          git config --global credential.helper store
          make install-packages opts="--extra saml --extra auth-controller --extra workflows --extra release-pipelines --extra scim"
          make install-private-modules
          rm -rf ${HOME}/.git-credentials

      - name: Generate MCP schema
        env:
          DJANGO_SETTINGS_MODULE: app.settings.production
          FLAGSMITH_API_URL: 'https://api.flagsmith.com'
          FLAGSMITH_FRONTEND_URL: 'https://app.flagsmith.com'
        run: make generate-mcp-spec

      - name: Install Gram CLI
        run: curl -fsSL https://go.getgram.ai/cli.sh | bash

      - name: Push to Gram
        env:
          GRAM_API_KEY: ${{ secrets.GRAM_API_KEY }}
          GRAM_ORG: ${{ vars.GRAM_ORG }}
          GRAM_PROJECT: ${{ vars.GRAM_PROJECT }}
        run: gram push --api-key "$GRAM_API_KEY" --org "$GRAM_ORG" --project "$GRAM_PROJECT" --config gram.json
