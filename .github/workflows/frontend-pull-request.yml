name: Frontend Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - frontend/**
      - .github/workflows/frontend-pull-request.yml

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --passWithNoTests

  smoke-test:
    name: Vercel Preview Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Wait for Vercel comment then smoke test
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Wait for the Vercel bot comment containing preview URLs.
          # Vercel posts/updates this comment on every push — even for
          # "Ignored Build Step" skips, the URLs from the previous
          # build are still live and testable.
          echo "⏳ Waiting for Vercel bot comment with preview URLs..."
          URLS=""
          for i in $(seq 1 30); do
            URLS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq '.[] | select(.user.login == "vercel[bot]") | .body' \
              | grep -o 'https://flagsmith-frontend[^ )]*')

            if [ -n "$URLS" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$URLS" ]; then
            echo "⚠️ No Vercel preview URLs found in PR comments"
            exit 1
          fi

          FAILED=0
          for URL in $URLS; do
            echo ""
            echo "🔍 Smoke testing $URL ..."

            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$URL/config/project-overrides")
            if [ "$STATUS" != "200" ]; then
              echo "⚠️ /config/project-overrides returned $STATUS"
              FAILED=1
            else
              echo "✅ /config/project-overrides OK"
            fi

            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$URL/")
            if [ "$STATUS" != "200" ]; then
              echo "⚠️ / returned $STATUS"
              FAILED=1
            else
              echo "✅ / OK"
            fi
          done

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "⚠️ Some smoke tests failed — see above"
            exit 1
          fi
          echo "🎉 All Vercel previews are healthy"
