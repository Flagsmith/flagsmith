name: Frontend Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - frontend/**
      - .github/workflows/frontend-pull-request.yml

permissions:
  contents: read
  pull-requests: read
  statuses: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --passWithNoTests

  smoke-test:
    name: Vercel Preview Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Wait for Vercel deployments to finish
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "⏳ Waiting for Vercel deployment checks to complete..."

          for i in $(seq 1 60); do
            STATUSES=$(gh api "repos/$REPO/commits/$SHA/status" \
              --jq '.statuses | [.[] | select(.context | test("flagsmith-frontend"; "i"))]')

            TOTAL=$(echo "$STATUSES" | jq 'length')
            PENDING=$(echo "$STATUSES" | jq '[.[] | select(.state == "pending")] | length')
            FAILED=$(echo "$STATUSES" | jq '[.[] | select(.state == "failure" or .state == "error")] | length')

            if [ "$TOTAL" -gt 0 ] && [ "$PENDING" = "0" ]; then
              if [ "$FAILED" -gt 0 ]; then
                echo "❌ Vercel deployment failed — skipping smoke test"
                echo "$STATUSES" | jq -r '.[] | select(.state == "failure" or .state == "error") | "  \(.context): \(.state)"'
                exit 1
              fi
              echo "✅ All $TOTAL Vercel deployments completed"
              break
            fi

            if [ "$TOTAL" = "0" ]; then
              echo "  Waiting for Vercel to start... ($i/60)"
            else
              echo "  $PENDING of $TOTAL still deploying... ($i/60)"
            fi
            sleep 10
          done

          if [ "$TOTAL" = "0" ] || [ "$PENDING" != "0" ]; then
            echo "⚠️ Timed out waiting for Vercel deployments"
            exit 1
          fi

      - name: Smoke test preview URLs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Parse frontend preview URLs from the Vercel bot comment.
          # Short poll to handle the small timing gap between Vercel
          # finishing the deploy and updating the PR comment.
          URLS=""
          for i in $(seq 1 6); do
            URLS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq '.[] | select(.user.login == "vercel[bot]") | .body' \
              | grep -o 'https://flagsmith-frontend[^ )]*\.vercel\.app')
            [ -n "$URLS" ] && break
            sleep 5
          done

          if [ -z "$URLS" ]; then
            echo "⚠️ No frontend preview URLs found in Vercel bot comment"
            exit 1
          fi

          FAILED=0
          for URL in $URLS; do
            echo ""
            echo "🔍 Smoke testing $URL ..."

            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$URL/config/project-overrides")
            if [ "$STATUS" != "200" ]; then
              echo "⚠️ /config/project-overrides returned $STATUS"
              FAILED=1
            else
              echo "✅ /config/project-overrides OK"
            fi

            RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 30 "$URL/")
            STATUS=$(echo "$RESPONSE" | tail -1)
            if [ "$STATUS" != "200" ]; then
              echo "⚠️ / returned $STATUS"
              FAILED=1
            elif ! echo "$RESPONSE" | grep -q 'Flagsmith'; then
              echo "⚠️ / returned 200 but body doesn't contain expected content"
              FAILED=1
            else
              echo "✅ / OK (status + content)"
            fi
          done

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "⚠️ Some smoke tests failed — see above"
            exit 1
          fi
          echo "🎉 All Vercel previews are healthy"
