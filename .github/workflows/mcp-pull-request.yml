name: MCP Pull Request

permissions:
  contents: read # For actions/checkout

on:
  pull_request:
    paths:
      - mcp/**
      - .github/**
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    paths:
      - mcp/**
      - .github/**
    branches:
      - main

defaults:
  run:
    working-directory: mcp

jobs:
  test:
    runs-on: ubuntu-latest
    name: MCP Tests

    steps:
      - name: Cloning repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: mcp/uv.lock

      - name: Install dependencies
        run: make install

      - uses: liskin/gh-problem-matcher-wrap@4abcf297257f3006bf8834221ec75181d6aff5e9 # v2
        with:
          action: add
          linters: mypy

      - name: Check for new typing errors
        run: make typecheck

      - uses: liskin/gh-problem-matcher-wrap@4abcf297257f3006bf8834221ec75181d6aff5e9 # v2
        with:
          action: remove
          linters: mypy

      - name: Run tests
        run: make test
